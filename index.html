<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eyish Typing Interface</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body { padding: 2rem; }
    #outputArea {
      width: 100%;
      height: 200px;
      font-size: 1.2rem;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Eyish Conlang Interface</h1>

    <div class="mb-3">
      <button id="toggleViewBtn" class="btn btn-primary">Switch to Script Creator</button>
    </div>

    <div id="typingView">
      <label for="scriptSelector" class="form-label">Select Script</label>
      <select id="scriptSelector" class="form-select mb-3"></select>

      <textarea id="outputArea" class="form-control" readonly placeholder="Start typing..."></textarea>
    </div>

    <div id="creatorView" style="display:none;">
      <h4>Create a New Script</h4>

      <div class="row g-2 mb-2">
        <div class="col-md-4">
          <input type="text" id="scriptName" class="form-control" placeholder="Script Name" />
        </div>
        <div class="col-md-2">
          <input type="text" id="keyInput" class="form-control" placeholder="Key" />
        </div>
        <div class="col-md-3">
          <input type="text" id="alphabetInput" class="form-control" placeholder="Alphabet" />
        </div>
        <div class="col-md-3">
          <input type="text" id="ipaInput" class="form-control" placeholder="IPA (optional)" />
        </div>
      </div>
      <button class="btn btn-success mb-3" onclick="addEntry()">Add Entry</button>
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Key</th>
            <th>Alphabet</th>
            <th>IPA</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entryTableBody"></tbody>
      </table>
      <button class="btn btn-primary" onclick="saveScript()">Save Script</button>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
